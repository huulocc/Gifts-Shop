<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" role="img" aria-labelledby="title desc">
  <title id="title">GiftShop curated gift flat-lay</title>
  <desc id="desc">Wrapped gifts, a journal, ribbon, candle, and bracelet arranged on a soft rose surface.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF7F5" />
      <stop offset="0.48" stop-color="#F4E9E8" />
      <stop offset="1" stop-color="#EEF1EB" />
    </linearGradient>
    <linearGradient id="roseBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C96F82" />
      <stop offset="1" stop-color="#94384B" />
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#EEF1EB" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#94384B" flood-opacity="0.16" />
    </filter>
    <filter id="smallShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#202322" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="980" rx="34" fill="url(#canvas)" />
